<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#00C896">
  <title>No7 Analytics</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./assets/icon-192.png">
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/animations.css">
</head>
<body>
  <main id="screen-login" class="login-screen-wrap">
    <div class="login-card">
      <div class="login-head">
        <h1>No7 Analytics</h1>
        <p>Dubai Airport T3 Arrivals</p>
      </div>

      <div id="login-tabs" class="login-tabs">
        <button class="tab active" data-tab="staff">Staff</button>
        <button class="tab" data-tab="master">Master</button>
      </div>

      <div id="login-error" class="login-error" hidden></div>

      <section id="panel-staff">
        <label class="field-label" for="input-staff-pin">Staff PIN</label>
        <input id="input-staff-pin" type="password" inputmode="numeric" maxlength="4" placeholder="Enter 4-digit PIN">
        <button id="btn-staff-login" class="btn btn-primary btn-full" type="button">Sign in</button>
      </section>

      <section id="panel-master" hidden>
        <label class="field-label" for="input-master-pwd">Master Password</label>
        <input id="input-master-pwd" type="password" placeholder="Enter master password">
        <button id="btn-master-verify" class="btn btn-primary btn-full" type="button">Verify</button>

        <div id="drag-unlock" hidden>
          <div id="drag-track" class="drag-track">
            <div id="drag-fill" class="drag-fill"></div>
            <div id="drag-thumb" class="drag-thumb">🔐</div>
            <div id="drag-text" class="drag-text">Slide to unlock</div>
          </div>
          <p id="drag-unlock-hint" class="login-hint">Slide to continue</p>
          <button id="hold-ring" class="hold-ring" hidden type="button" aria-label="Hold to confirm master access">
            <svg width="80" height="80" viewBox="0 0 80 80" aria-hidden="true">
              <circle cx="40" cy="40" r="35" stroke="#e8f2ee" stroke-width="6" fill="none"></circle>
              <circle id="hold-ring-progress" cx="40" cy="40" r="35" stroke="#00C896" stroke-width="6" fill="none" stroke-linecap="round" transform="rotate(-90 40 40)"></circle>
            </svg>
            <span id="hold-ring-text">5</span>
          </button>
        </div>
      </section>
    </div>
  </main>

  <main id="screen-app" hidden>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>No7 Analytics</h2>
        <div id="sidebar-user-chip"></div>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
      <button id="btn-logout-desktop" class="btn btn-outline btn-full" type="button">Logout</button>
    </aside>

    <section class="content-shell">
      <header class="app-header">
        <div>
          <h3 id="header-title">Entry</h3>
          <p id="header-sub"></p>
        </div>
        <div class="header-actions">
          <span id="role-badge" class="role-badge role-badge-staff">Staff</span>
          <button id="btn-checklist-toggle" class="btn btn-outline" type="button">☑ Checklist</button>
          <button id="btn-logout-mobile" class="btn btn-outline" type="button">Logout</button>
        </div>
      </header>

      <div id="sync-bar" class="sync-bar"><span id="sync-text">Ready</span></div>
      <section id="checklist-panel" class="checklist-panel"><div id="checklist-panel-inner" class="checklist-panel-inner"></div></section>

      <div class="view-container">
        <section id="view-entry" class="view active"></section>
        <section id="view-analysis" class="view"></section>
        <section id="view-staff" class="view"></section>
        <section id="view-admin" class="view"></section>
      </div>

      <nav id="bottom-nav" class="bottom-nav"></nav>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
